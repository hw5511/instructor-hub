<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>양희우 강사 허브</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Profile Section -->
<header class="profile">
    <div class="profile-inner">
        <div class="profile-avatar">
            <div class="avatar-placeholder">HW</div>
        </div>
        <div class="profile-info">
            <h1>양희우</h1>
            <p class="profile-role">SBS아카데미 컴퓨터아트 강남 | AI & Web 강사</p>
            <p class="profile-desc">AI 아트웍, 바이브코딩, 웹개발을 가르치는 실무형 강사입니다.</p>
            <div class="profile-tags">
                <span class="tag">AI Artwork</span>
                <span class="tag">Web Development</span>
                <span class="tag">ComfyUI</span>
                <span class="tag">Claude Code</span>
            </div>
        </div>
    </div>
</header>

<!-- Lecture Cards Section -->
<main class="lectures">
    <h2 class="section-title">Lectures</h2>
    <div class="card-grid" id="lectureGrid">
        <!-- Cards populated by JS or static -->
    </div>
</main>

<script src="app.js"></script>
</body>
</html>
